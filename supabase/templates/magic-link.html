<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmacoschap verificatiecode</title>
  </head>
  <body style="margin:0;padding:0;background-color:#f4f7fb;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,Arial,sans-serif;color:#111827;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f7fb;padding:32px 16px;">
      <tr>
        <td align="center">
          <table width="520" cellpadding="0" cellspacing="0" style="max-width:520px;width:100%;background-color:#ffffff;border-radius:24px;overflow:hidden;border:1px solid rgba(0,17,88,0.08);box-shadow:0 18px 40px rgba(0,17,88,0.08);">
            <tr>
              <td style="padding:36px 32px 24px 32px;text-align:center;background:linear-gradient(180deg,#ffffff 0%,#f8faff 100%);">
                <p style="margin:0 auto;font-size:16px;font-weight:700;line-height:1.2;color:#001158;text-align:center;">
                  Farmacoschap
                </p>
              </td>
            </tr>
            <tr>
              <td style="padding:20px 32px 32px 32px;text-align:center;">
                <p style="margin:0 0 12px 0;font-size:24px;font-weight:700;line-height:1.2;color:#111827;">
                  Je verificatiecode
                </p>
                <p style="margin:0 0 24px 0;font-size:15px;line-height:1.6;color:#4b5563;">
                  Gebruik deze code om verder te gaan.
                </p>
                <table width="100%" cellpadding="0" cellspacing="0" style="margin:0 0 20px 0;">
                  <tr>
                    <td style="padding:28px 20px;border-radius:20px;background-color:#f7f9fc;border:1px solid rgba(0,17,88,0.10);text-align:center;">
                      <p style="margin:0;font-size:36px;font-weight:700;line-height:1.1;letter-spacing:0.3em;color:#001158;font-variant-numeric:tabular-nums;">
                        {{ .Token }}
                      </p>
                    </td>
                  </tr>
                </table>
                <p style="margin:0;font-size:13px;line-height:1.6;color:#6b7280;">
                  Heb je deze code niet aangevraagd? Dan kun je deze e-mail negeren.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
